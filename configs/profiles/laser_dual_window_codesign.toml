name = "laser_dual_window_codesign"
description = "Primary co-design case with one Earth-side station and one lunar-side station."
launch_lane = "gto_secondary"
beam_architecture = "dual_window"
duration_days = 120.0

[beam_roles]
perigee_boost = true
lunar_brake = true

[station_families]
perigee_boost = ["geo", "high_earth_elliptical_relay", "supersynchronous_relay"]
lunar_brake = ["eml1_halo", "nrho", "dro"]

[success]
min_capture_duration_days = 3.0
min_perilune_altitude_km = 100.0
max_perilune_altitude_km = 1000.0
max_capture_apoapsis_km = 30000.0
min_final_mass_kg = 20.0
